<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Instagram Analytics</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5rem;
    }

    .container {
        margin-top: 30px;
    }

    input {
        padding: 12px;
        width: 250px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
    }

    button {
        padding: 12px 20px;
        margin-left: 10px;
        border-radius: 8px;
        border: none;
        background: #ff7a18;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4b2b;
        transform: scale(1.05);
    }

    .dashboard {
        display: none;
        margin-top: 40px;
    }

    .cards {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 15px;
        width: 200px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin: 0;
        font-size: 1.2rem;
    }

    .card p {
        font-size: 1.8rem;
        margin-top: 10px;
        font-weight: bold;
    }

    .download-btn {
        margin-top: 30px;
        background: #00c9a7;
    }

    .download-btn:hover {
        background: #00a98f;
    }

    .loader {
        display: none;
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>

<body>

<h1>📊 Instagram Analytics</h1>

<div class="container">
    <input type="text" id="username" placeholder="Ingresa usuario">
    <button onclick="buscar()">Analizar</button>
</div>

<div class="loader" id="loader">⏳ Analizando cuenta...</div>

<div class="dashboard" id="dashboard">
    <h2 id="user"></h2>

    <div class="cards">
        <div class="card">
            <h3>👥 Seguidores</h3>
            <p id="seguidores"></p>
        </div>

        <div class="card">
            <h3>📸 Publicaciones</h3>
            <p id="posts"></p>
        </div>

        <div class="card">
            <h3>❤️ Likes</h3>
            <p id="likes"></p>
        </div>

        <div class="card">
            <h3>💬 Comentarios</h3>
            <p id="comentarios"></p>
        </div>
    </div>

    <button class="download-btn" onclick="descargar()">⬇ Descargar Excel</button>
</div>

<script>
let currentUser = "";

function buscar() {
    const user = document.getElementById("username").value.trim();

    if (!user) {
        alert("Ingresa un usuario");
        return;
    }

    currentUser = user;

    document.getElementById("loader").style.display = "block";
    document.getElementById("dashboard").style.display = "none";

    fetch(`/api/scrape/${user}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("loader").style.display = "none";

            if (data.status === "success") {
                document.getElementById("dashboard").style.display = "block";

                document.getElementById("user").innerText = "@" + data.data.usuario;
                document.getElementById("seguidores").innerText = data.data.seguidores;
                document.getElementById("posts").innerText = data.data.publicaciones;
                document.getElementById("likes").innerText = data.data.likes;
                document.getElementById("comentarios").innerText = data.data.comentarios;
            } else {
                alert(data.message);
            }
        })
        .catch(err => {
            document.getElementById("loader").style.display = "none";
            alert("Error al conectar");
            console.error(err);
        });
}

function descargar() {
    if (!currentUser) {
        alert("Primero analiza un usuario");
        return;
    }

    window.open(`/api/export/${currentUser}`, "_blank");
}
</script>

</body>
</html>
